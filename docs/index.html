      function resolveGithubRepoUrl() {
        var path = window.location.pathname.replace(/\/index\.html$/, '/').replace(/\/+$/, '');
        var seg = path.split('/').filter(Boolean);
        var user = 'agent026-026';
        var repo = 'sillycard';
        if (seg.length >= 2 && window.location.hostname.endsWith('github.io')) {
          user = seg[0];
          repo = seg[1];
        }
        if (user && repo) {
          return 'https://github.com/' + user + '/' + repo;
        }
        return 'https://github.com/agent026-026/sillycard';
      }

      function normalizeLocale(saved) {
        if (LOCALES.indexOf(saved) !== -1) {
          return saved;
        }
        return 'en';
      }

      function getInitialLocale() {
        try {
          return normalizeLocale(localStorage.getItem(STORAGE_KEY));
        } catch (e) {
          return 'en';
        }
      }

      function applyLocale(lang) {
        var locale = normalizeLocale(lang);
        var dict = I18N[locale] || I18N.en;
        document.documentElement.lang = locale;

        document.querySelectorAll('[data-i18n]').forEach(function (el) {
          var key = el.getAttribute('data-i18n');
          if (key && dict[key] != null) {
            el.textContent = dict[key];
          }
        });
        document.querySelectorAll('[data-i18n-html]').forEach(function (el) {
          var key = el.getAttribute('data-i18n-html');
          if (key && dict[key] != null) {
            el.innerHTML = dict[key];
          }
        });

        document.title = dict.title;
        var meta = document.querySelector('meta[name="description"]');
        if (meta && dict.metaDescription) {
          meta.setAttribute('content', dict.metaDescription);
        }

        var repoUrl = resolveGithubRepoUrl();
        var repoEl = document.getElementById('repo-link');
        if (repoEl) {
          repoEl.innerHTML = '<a href="' + repoUrl.replace(/"/g, '&quot;') + '">' + repoUrl + '</a>';
        }

        var sel = document.getElementById('lang-select');
        if (sel) {
          sel.value = locale;
        }

        try {
          localStorage.setItem(STORAGE_KEY, locale);
        } catch (e) { /* ignore */ }
      }

      var initial = getInitialLocale();
      applyLocale(initial);

      var langSelect = document.getElementById('lang-select');
      if (langSelect) {
        langSelect.addEventListener('change', function () {
          applyLocale(langSelect.value);
        });
      }
    })();
